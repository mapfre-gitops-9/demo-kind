apiVersion: v1
kind: ConfigMap
metadata:
  name: reverse-proxy-config
  labels:
    app: reverse-proxy
data:
  default.conf: |
    server {
        listen 80;

        location /api {
            proxy_pass http://backend-service:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://frontend-service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
