apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverse-proxy
  labels:
    app.kubernetes.io/name: reverse-proxy
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: demo-kind
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reverse-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reverse-proxy
        app.kubernetes.io/component: proxy
        app.kubernetes.io/part-of: demo-kind
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginx:1.31.2-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 64Mi
              cpu: 100m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: temporary-files
              mountPath: /tmp
      volumes:
        - name: nginx-config
          configMap:
            name: reverse-proxy-config
        - name: temporary-files
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
