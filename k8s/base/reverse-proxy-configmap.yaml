apiVersion: v1
kind: ConfigMap
metadata:
  name: reverse-proxy-config
  labels:
    app.kubernetes.io/name: reverse-proxy
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: demo-kind
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr notice;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format privacy
            '$remote_addr - $request_method $uri $server_protocol '
            '$status $body_bytes_sent';
        access_log /dev/stdout privacy;
        sendfile on;

        client_body_temp_path /tmp/client_temp;
        proxy_temp_path /tmp/proxy_temp;
        fastcgi_temp_path /tmp/fastcgi_temp;
        uwsgi_temp_path /tmp/uwsgi_temp;
        scgi_temp_path /tmp/scgi_temp;

        include /etc/nginx/conf.d/*.conf;
    }
  default.conf: |
    server {
        listen 8080;
        server_name _;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location /api/ {
            proxy_pass http://backend-service:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend-service:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
